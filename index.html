<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>You've Got a Letter</title>
<style>
body{margin:0;font-family:Georgia,serif;background:#f5efe6;display:flex;justify-content:center;align-items:center;height:100vh;color:#5b4636}
#env{cursor:pointer;text-align:center}
.envelope{width:260px;height:170px;background:#e8d7c5;position:relative;border-radius:6px;box-shadow:0 8px 20px rgba(0,0,0,.15)}
.envelope:before{content:"";position:absolute;left:0;top:0;border-left:130px solid transparent;border-right:130px solid transparent;border-top:90px solid #d9c1a8}
#letter{display:none;background:#fffaf2;padding:25px;border-radius:10px;max-width:520px;box-shadow:0 8px 20px rgba(0,0,0,.15)}
img{max-width:100%;border-radius:8px;margin-top:20px}
button{padding:10px 20px;border:none;border-radius:20px;background:#8c6a52;color:white}
</style>
</head>
<body>
<div id="env" onclick="openLetter()">
<h2>You've got a letter 💌</h2>
<div class="envelope"></div>
<p>Tap the envelope to open</p>
</div>

<div id="letter">
<h2>Dear ______,</h2>
<p>Write your letter here...</p>
<p><br><br>Love,<br>Jessica</p>
<h3>Concert Ticket</h3>
<p>Place a file named <b>ticket.png</b> in the same folder and it will appear below.</p>
<img src="ticket.png" onerror="this.style.display='none'">
</div>

<script>
function openLetter(){
document.getElementById('env').style.display='none';
document.getElementById('letter').style.display='block';
}
</script>
</body>
</html>
